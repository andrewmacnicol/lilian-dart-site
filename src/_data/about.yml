biography:
  - "I am a geographer researching environmental governance. My doctoral work
    focuses on environmental communication, social networks, and stewardship
    adoption on Canada’s agricultural landscapes. I have interests in
    collaboration, applied environmental policy, and qualitative methodology. "
  - With a strong academic foundation spanning both the sciences and social
    sciences, my previous work has explored community-based conservation,
    community health, and housing policy. This breadth of experience enables me
    to approach research through multiple lenses, drawing from a range of fields
    and methodologies.
  - Alongside my doctoral work, I contribute to projects on faith-based
    environmentalism, commons and commoning, biodiversity policy, and housing
    and homelessness policy.
