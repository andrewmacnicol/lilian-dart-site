meta_description: Lilian Dart is a PhD candidate in Human Geography at the
  University of Toronto, researching human-environment relationships,
  environmental communication, and collaboration.
eyebrow: PhD Candidate · University of Toronto
bio: Geographer researching how human-environment relationships shape behaviour,
  participation, and environmental decision-making in Canada. Particularly
  interested in agricultural stewardship, environmental communication,
  collaboration, and the tensions between capital and place.
