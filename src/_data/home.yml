meta_description: "Lilian Dart is a PhD candidate in Human Geography at the University of Toronto, researching human-environment relationships, rural stewardship, and collaborative governance in Canada."
eyebrow: "PhD Candidate · University of Toronto"
bio: "Geographer researching how human-environment relationships shape behaviour, participation, and environmental decision-making in Canada. Particularly interested in rural stewardship, collaborative governance, and the tensions between capital and place."
