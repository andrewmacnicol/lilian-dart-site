hero_label: Research
hero_title: Research & Publications
focus_statement: My doctoral research explores how agricultural producers
  negotiate the tensions between capital and place in stewardship decisions, and
  how communication and collaborative governance can foster more just and
  sustainable outcomes on working landscapes.
methods_paragraph: My work is qualitative and I draw heavily on interviews and document analysis.
