hero_label: Teaching
hero_title: Teaching Experience
philosophy_quote: I bring the same breadth and curiosity that shapes my research
  into the classroom. I aim to draw connections across disciplines and encourage
  my students to think critically about how people, places, and environments are
  entangled.
philosophy_paragraph: As a course instructor at the University of Toronto, I am
  committed to creating inclusive, engaging learning environments. My teaching
  draws on my interdisciplinary background across the sciences and social
  sciences,  and I like to be creative in my pedagogical approach, teaching
  students through games, simulations, and discussion. While I believe teaching
  content is important, I put an equal emphasis on fostering growth and critical
  thinking in my students.
